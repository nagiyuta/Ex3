{% extends "base.html" %}

{% block content %}

<h2>Write Review</h2>

<form method="post">

{% csrf_token %}

Rating (0-10)

<input
type="number"
name="rating"
min="0"
max="10">

<br><br>
<label for="review">
Review
</label>
<br>
<textarea
name="review"
rows="5"
cols="40">
</textarea>

<br><br>

<button type="submit">
Submit
</button>

</form>

{% endblock %}
