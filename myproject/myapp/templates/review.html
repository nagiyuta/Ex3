{% extends "base.html" %}

{% block content %}

<h2>Write a Review for {{ movie.title }}</h2>

<form method="post">
    {% csrf_token %}

    <div>
        <label for="rating">Rating</label>
        <input
            id="rating"
            type="number"
            name="rating"
            min="0"
            max="10"
            required
        >
    </div>

    <div>
        <label for="review">Review</label>
        <textarea
            id="review"
            name="review"
            rows="6"
            required
        ></textarea>
    </div>

    <button type="submit">Submit Review</button>
</form>

<p>
    <a href="{% url 'movie_detail' movie.id %}">
        Back to movie details
    </a>
</p>

{% endblock %}
