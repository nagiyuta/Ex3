{% extends "base.html" %}

{% block content %}

<h2>User Registration</h2>

<form method="post">

{% csrf_token %}
<label for="username">
Username
</label>

<input
id="username"
type="text"
name="username">

<br><br>

<label for="password">
Password
</label>

<input
id="password"
type="password"
name="password">
<br><br>

<button type="submit">
Register
</button>

</form>

{% endblock %}
