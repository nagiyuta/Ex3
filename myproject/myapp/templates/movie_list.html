{% extends "base.html" %}

{% block content %}

<h2>Movie List</h2>

<form
    method="get"
    hx-get="{% url 'movie_search' %}"
    hx-target="#movie-results"
    hx-trigger="keyup changed delay:500ms from:#search,
                change from:#rating"
    hx-include="#search, #rating"
>
    <div>
        <label for="search">Search by title</label>
        <input
            id="search"
            type="search"
            name="search"
            value="{{ search }}"
            placeholder="Enter a movie title"
        >
    </div>

    <div>
        <label for="rating">Minimum rating</label>
        <input
            id="rating"
            type="number"
            name="rating"
            min="0"
            max="10"
            value="{{ rating }}"
        >
    </div>

    <noscript>
        <button type="submit">Search</button>
    </noscript>
</form>

<section
    id="movie-results"
    aria-live="polite"
    aria-label="Movie search results"
>
    {% include "partials/movie_results.html" %}
</section>

{% endblock %}
