schema: spec-driven

context: |
  Tech stack: Python 3.13, Django 6.x
  Package manager: uv
  Formatter: black (line-length 88)
  Linter: pylint
  Testing: pytest + pytest-cov
  Database: SQLite3
  Domain: FilmReview - a movie review application where users can view and write reviews for movies.

  Project structure:
  - myproject/myproject/ — Django project config (settings, urls, wsgi)
  - myproject/myapp/ — Main application with models, views, migrations

  Database models:
  - Movie: title (CharField), director (CharField), release_year (IntegerField), genre (CharField)
  - Review: movie (FK→Movie, CASCADE), reviewer (CharField), rating (IntegerField), comment (TextField), created_at (DateTimeField, auto_now_add)
  - Relationship: Review belongs to Movie (related_name="reviews")

  Conventions:
  - Business logic goes in services.py
  - Read/query logic goes in selectors.py
  - Do not edit old migrations; create new ones
  - Prefer small, targeted changes over broad refactors

rules:
  proposal:
    - Keep proposals under 500 words
    - Always include a "Non-goals" section
    - Reference existing code patterns when applicable
  tasks:
    - Break tasks into chunks of max 2 hours
    - Each task should be independently testable
    - Include verification steps
