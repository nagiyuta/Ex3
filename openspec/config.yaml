schema: spec-driven

context: |
  Tech stack: Python 3.13, Django 6.x
  Package manager: uv
  Formatter: black (line-length 88)
  Linter: pylint
  Testing: pytest + pytest-cov
  Database: SQLite3
  Domain: FilmReview - a movie review application where users can register, browse movies, and write reviews.

  Project structure:
  - myproject/myproject/ — Django project config (settings, urls, wsgi)
  - myproject/myapp/ — Main application with models, views, urls, migrations

  Database models:
  - User: username (CharField, max_length=30, unique), password (CharField, max_length=9)
  - Movie: title (CharField, max_length=200), poster_image (CharField, max_length=255)
  - Review: user (FK→User, CASCADE), movie (FK→Movie, CASCADE), star_rating (PositiveSmallIntegerField), review_text (TextField)

  URL routes:
  - / — home
  - /register/ — user registration
  - /movies/ — movie list
  - /movies/search/ — search movies
  - /movies/sort/ — sort movies by rating
  - /movies/filter/ — filter movies by rating
  - /movies/<id>/ — movie detail
  - /movies/<id>/review/ — write review

rules:
  proposal:
    - Keep proposals under 500 words
    - Always include a "Non-goals" section
    - Reference existing code patterns when applicable
  tasks:
    - Break tasks into chunks of max 2 hours
    - Each task should be independently testable
    - Include verification steps
