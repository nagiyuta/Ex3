schema: spec-driven

context: |
  Tech stack: Python 3.13, Django 6.x
  Package manager: uv
  Formatter: black (line-length 88)
  Linter: pylint
  Testing: pytest + pytest-cov
  Database: SQLite3
  Domain: FilmReview - a movie review application where users can register, login, browse movies, and write reviews.

  Project structure:
  - myproject/myproject/ — Django project config (settings, urls, wsgi)
  - myproject/myapp/ — Main application with models, views, urls, templates, static

  Database models:
  - User: username (CharField, max_length=30, unique), password (CharField, max_length=9)
  - Movie: title (CharField, max_length=200), poster_image (CharField, max_length=255)
  - Review: user (FK→User, CASCADE), movie (FK→Movie, CASCADE), star_rating (PositiveSmallIntegerField), review_text (TextField)

  URL routes:
  - / — home (renders template)
  - /register/ — user registration (POST: validates, stub)
  - /login/ — user login (POST: queries DB, sets session)
  - /movies/ — movie list (renders template, search/rating params)
  - /review/<id>/ — write review (POST: validates, stub)

  Templates:
  - base.html — base layout with nav (Home, Movies, Register, Login)
  - home.html, register.html, login.html, movie_list.html, review.html

  Static:
  - css/style.css — basic styling

rules:
  proposal:
    - Keep proposals under 500 words
    - Always include a "Non-goals" section
    - Reference existing code patterns when applicable
  tasks:
    - Break tasks into chunks of max 2 hours
    - Each task should be independently testable
    - Include verification steps
