schema: spec-driven

context: |
  Tech stack: Python 3.13, Django 6.x, htmx 2.0.4
  Package manager: uv
  Formatter: black (line-length 88)
  Linter: pylint
  Testing: pytest + pytest-cov
  Database: SQLite3
  Domain: FilmReview - a movie review application where users can register, login, browse movies, and write reviews.

  Project structure:
  - myproject/myproject/ — Django project config (settings, urls, wsgi)
  - myproject/myapp/ — Main application with models, views, urls, templates, static

  Database models:
  - User: username (CharField, max_length=30, unique), password (CharField, max_length=9)
  - Movie: title (CharField, max_length=200), poster_image (URLField, max_length=500, blank=True)
  - Review: user (FK→User, CASCADE, related_name="reviews"), movie (FK→Movie, CASCADE, related_name="reviews"), star_rating (PositiveSmallIntegerField), review_text (TextField)

  URL routes:
  - / — home (renders template)
  - /register/ — user registration (POST: saves to DB)
  - /login/ — user login (POST: queries DB, sets session)
  - /movies/ — movie list (DB query, pagination, HTMX search)
  - /movies/search/ — movie search partial (returns HTML fragment)
  - /movies/<id>/ — movie detail (DB query, shows reviews)
  - /review/<id>/ — write review (POST: saves to DB, requires login)

  Features:
  - HTMX-powered live search on movie list
  - Pagination (10 movies per page)
  - Average rating calculation via annotation
  - Session-based authentication
  - Admin interface for all models

rules:
  proposal:
    - Keep proposals under 500 words
    - Always include a "Non-goals" section
    - Reference existing code patterns when applicable
  tasks:
    - Break tasks into chunks of max 2 hours
    - Each task should be independently testable
    - Include verification steps
