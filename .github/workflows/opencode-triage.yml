name: Issue Triage

on:
  issues:
    types: [opened]

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Run OpenCode
        uses: anomalyco/opencode/github@latest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          model: anthropic/claude-sonnet-4-5
          prompt: |
            Review this issue for the FilmReview Django project.
            - If it's a bug report, analyze the described behavior and suggest debugging steps
            - If it's a feature request, evaluate feasibility and scope
            - Add appropriate labels or suggestions
            - Be concise and helpful
